<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; }
        canvas { display: block; background-color: #fff; border-bottom: 2px solid #535353; width: 100%; height: 100%; }
        .countdown-pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div id="ui-container" class="relative bg-white shadow-2xl rounded-xl overflow-hidden w-full max-w-4xl aspect-[16/9] flex flex-col border-4 border-gray-800">
        
        <!-- Màn hình lỗi cấu hình -->
        <div id="error-overlay" class="hidden absolute inset-0 z-[100] bg-red-50 flex flex-col items-center justify-center p-8 text-center">
            <h2 class="text-2xl font-bold text-red-700 mb-2">Thiếu cấu hình Firebase</h2>
            <p class="text-gray-600 mb-6 max-w-md">Vui lòng dán mã config từ Firebase vào code để sử dụng tính năng mạng LAN.</p>
            <button onclick="startGame('single')" class="px-6 py-2 bg-gray-800 text-white rounded-lg font-bold">Chơi Đơn (Offline)</button>
        </div>

        <!-- Menu chính -->
        <div id="menu-screen" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-white p-8">
            <h1 class="text-7xl font-black mb-12 text-gray-800 tracking-tighter italic uppercase">Dino Multiplayer</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-2xl">
                <button onclick="startGame('single')" class="p-6 bg-white border-4 border-blue-500 hover:bg-blue-500 text-blue-500 hover:text-white rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 font-bold text-xl">
                    Chơi Đơn
                </button>
                <button onclick="showScreen('create-room-screen')" class="p-6 bg-white border-4 border-green-500 hover:bg-green-500 text-green-500 hover:text-white rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 font-bold text-xl">
                    Tạo Server
                </button>
                <button onclick="listRooms()" class="p-6 bg-white border-4 border-purple-500 hover:bg-purple-500 text-purple-500 hover:text-white rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 font-bold text-xl">
                    Tìm Server
                </button>
            </div>
            <button onclick="showScreen('settings-screen')" class="mt-12 text-gray-400 hover:text-gray-800 font-bold underline decoration-2">Tùy chỉnh nhân vật & Phím nhảy</button>
        </div>

        <!-- Cài đặt -->
        <div id="settings-screen" class="hidden absolute inset-0 z-20 flex flex-col items-center justify-center bg-white p-8">
            <h2 class="text-3xl font-black mb-6">CÀI ĐẶT</h2>
            <div class="w-full max-w-md space-y-4 bg-gray-50 p-6 rounded-2xl border-2 border-gray-200">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Tên người chơi</label>
                    <input type="text" id="dino-name" value="Dino Player" class="mt-1 w-full px-4 py-2 border-2 border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Màu sắc Dino</label>
                    <input type="color" id="dino-color" value="#535353" class="mt-1 w-full h-12 p-1 border-2 border-gray-300 rounded-lg cursor-pointer">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Phím Nhảy (Mặc định: Space)</label>
                    <button id="jump-key-btn" class="mt-1 w-full px-4 py-2 bg-white border-2 border-dashed border-gray-400 rounded-lg text-gray-600 font-bold">Space</button>
                </div>
            </div>
            <button onclick="saveSettings()" class="mt-8 px-12 py-3 bg-gray-800 text-white font-black rounded-xl hover:bg-black transition shadow-lg">LƯU THAY ĐỔI</button>
        </div>

        <!-- Tìm phòng -->
        <div id="rooms-screen" class="hidden absolute inset-0 z-20 flex flex-col items-center justify-center bg-white p-8">
            <h2 class="text-3xl font-black mb-6 italic">DANH SÁCH SERVER</h2>
            <div id="room-list" class="w-full max-w-lg h-64 overflow-y-auto border-4 border-gray-100 rounded-2xl p-4 space-y-3 mb-4 bg-gray-50"></div>
            <button onclick="showScreen('menu-screen')" class="px-8 py-2 border-2 border-gray-300 rounded-lg font-bold">QUAY LẠI</button>
        </div>

        <!-- Tạo phòng -->
        <div id="create-room-screen" class="hidden absolute inset-0 z-20 flex flex-col items-center justify-center bg-white p-8">
            <h2 class="text-3xl font-black mb-6 italic text-center uppercase">Thiết lập Server</h2>
            <div class="w-full max-w-sm space-y-4">
                <input type="text" id="room-name" placeholder="Tên phòng..." class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl font-bold">
                <input type="password" id="room-pass" placeholder="Mật khẩu (không bắt buộc)" class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl font-bold">
                <button onclick="handleCreateRoom()" class="w-full py-4 bg-green-500 text-white font-black rounded-xl shadow-lg hover:bg-green-600">MỞ PHÒNG CHỜ</button>
            </div>
            <button onclick="showScreen('menu-screen')" class="mt-6 text-gray-400 hover:text-black font-bold underline">HỦY BỎ</button>
        </div>

        <!-- Màn hình chơi game -->
        <div id="game-container" class="relative flex-grow flex flex-col hidden">
            <!-- Game Header -->
            <div class="flex justify-between items-center p-4 bg-gray-50 border-b-2 border-gray-800 z-10">
                <div id="game-status" class="font-black text-gray-800 bg-yellow-300 px-3 py-1 rounded border-2 border-black text-xs uppercase">Trạng Thái</div>
                <div id="live-leaderboard" class="flex gap-4 text-xs font-mono font-bold text-blue-800"></div>
                <div class="text-2xl font-mono font-black" id="score-display">00000</div>
            </div>

            <!-- Canvas Area -->
            <div class="relative flex-grow bg-white overflow-hidden">
                <canvas id="gameCanvas"></canvas>

                <!-- Lobby Overlay -->
                <div id="lobby-overlay" class="absolute inset-0 bg-black/5 flex flex-col items-center justify-center z-20">
                    <div class="bg-white p-8 rounded-2xl border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] text-center w-full max-w-md">
                        <h3 class="text-2xl font-black mb-6 uppercase tracking-widest italic">Sảnh Đợi</h3>
                        <div id="lobby-players" class="mb-6 space-y-2 max-h-40 overflow-y-auto p-2">
                            <!-- Players state here -->
                        </div>
                        <div class="flex gap-4 justify-center">
                            <button id="ready-btn" onclick="toggleReady()" class="px-8 py-3 bg-blue-500 text-white font-black rounded-xl border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all">SẴN SÀNG</button>
                            <button id="start-btn" onclick="requestStart()" class="hidden px-8 py-3 bg-green-500 text-white font-black rounded-xl border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all disabled:opacity-50 disabled:grayscale">BẮT ĐẦU</button>
                        </div>
                        <p id="start-hint" class="mt-4 text-xs font-bold text-gray-400">Cần ít nhất 2 người và tất cả phải sẵn sàng</p>
                    </div>
                </div>

                <!-- Countdown Overlay -->
                <div id="countdown-overlay" class="hidden absolute inset-0 z-30 bg-white/50 flex items-center justify-center">
                    <div id="countdown-text" class="text-9xl font-black text-gray-800 countdown-pulse">3</div>
                </div>

                <!-- Game Over / Leaderboard Overlay -->
                <div id="final-results-overlay" class="hidden absolute inset-0 z-40 bg-black/80 flex flex-col items-center justify-center p-8">
                    <div class="bg-white p-8 rounded-3xl border-8 border-gray-800 w-full max-w-md shadow-2xl">
                        <h2 class="text-4xl font-black text-center mb-6 italic uppercase tracking-tighter">BẢNG VÀNG</h2>
                        <div id="ranking-list" class="space-y-4 mb-8 font-mono">
                            <!-- Ranked players -->
                        </div>
                        <div class="flex flex-col gap-3">
                            <button id="replay-btn" onclick="requestReplay()" class="hidden w-full py-4 bg-blue-600 text-white font-black rounded-2xl border-4 border-black text-xl hover:bg-blue-700 transition">CHƠI TIẾP</button>
                            <p id="wait-msg" class="text-center text-gray-500 font-bold animate-pulse italic">Chờ các đối thủ khác tử trận...</p>
                            <button onclick="exitGame()" class="w-full text-gray-400 font-bold underline">Thoát ra Menu</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- Firebase Init ---
        let db, auth, appId;
        try {
            const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
            if (!firebaseConfig.apiKey) throw new Error();
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'dino-mp-v1';
        } catch (e) {
            document.getElementById('error-overlay').classList.remove('hidden');
        }

        // --- Game Logic ---
        let user = null;
        let currentRoomId = null;
        let isHost = false;
        let dinoSettings = { name: "Dino Player", color: "#535353", jumpKey: " " };
        let otherPlayers = {};
        let roomData = {};
        let gameState = 'lobby'; 
        let lastSpeedScore = 0;

        const GRAVITY = 0.6;
        const JUMP_FORCE = -12;
        const GROUND_Y = 180;
        let gameSpeed = 6;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let animationId;

        class Dino {
            constructor(name, color, isLocal = false) {
                this.name = name; this.color = color; this.isLocal = isLocal;
                this.width = 44; this.height = 47;
                this.x = 80; this.y = GROUND_Y - this.height;
                this.dy = 0; this.isJumping = false;
                this.score = 0; this.isAlive = true;
                this.isReady = false;
            }
            jump() { if (!this.isJumping && this.isAlive && gameState === 'playing') { this.dy = JUMP_FORCE; this.isJumping = true; } }
            update() {
                if (!this.isAlive || gameState !== 'playing') return;
                this.dy += GRAVITY; this.y += this.dy;
                if (this.y > GROUND_Y - this.height) { this.y = GROUND_Y - this.height; this.dy = 0; this.isJumping = false; }
                this.score += 0.1;
            }
            draw(ctx) {
                ctx.save();
                ctx.fillStyle = this.color;
                if (!this.isLocal) ctx.globalAlpha = 0.4;
                ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(this.name, this.x + this.width/2, this.y - 15);
                ctx.fillRect(this.x + 20, this.y, 24, 15); ctx.fillRect(this.x, this.y + 15, 35, 20);
                ctx.fillRect(this.x + 10, this.y + 35, 5, 12); ctx.fillRect(this.x + 25, this.y + 35, 5, 12);
                ctx.fillStyle = "white"; ctx.fillRect(this.x + 35, this.y + 4, 4, 4);
                ctx.restore();
            }
        }

        class Obstacle {
            constructor(x, type) {
                this.x = x;
                this.type = type; // 0,1: Cactus, 2,3: Birds
                this.w = (type < 2) ? (type === 0 ? 20 : 35) : 40;
                this.h = (type < 2) ? (type === 0 ? 35 : 50) : 30;
                this.y = (type < 2) ? (GROUND_Y - this.h) : (type === 2 ? GROUND_Y - 40 : GROUND_Y - 85);
            }
            update() { this.x -= gameSpeed; }
            draw(ctx) {
                ctx.fillStyle = this.type < 2 ? "#535353" : "#ff4444";
                ctx.fillRect(this.x, this.y, this.w, this.h);
                if (this.type >= 2) { ctx.fillStyle = "white"; ctx.fillRect(this.x + 5, this.y + 5, 5, 5); }
            }
        }

        let localDino;
        let obstacles = [];
        let lastObstacleTime = 0;

        async function init() {
            if (db && auth) {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, u => user = u);
            }
            const saved = localStorage.getItem('dino_mp_settings');
            if (saved) {
                dinoSettings = JSON.parse(saved);
                document.getElementById('dino-name').value = dinoSettings.name;
                document.getElementById('dino-color').value = dinoSettings.color;
                document.getElementById('jump-key-btn').innerText = dinoSettings.jumpKey === " " ? "Space" : dinoSettings.jumpKey;
            }
        }

        window.showScreen = (id) => {
            ['menu-screen', 'settings-screen', 'create-room-screen', 'rooms-screen', 'game-container', 'error-overlay'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.saveSettings = () => {
            dinoSettings.name = document.getElementById('dino-name').value || "Dino Player";
            dinoSettings.color = document.getElementById('dino-color').value;
            localStorage.setItem('dino_mp_settings', JSON.stringify(dinoSettings));
            showScreen('menu-screen');
        };

        document.getElementById('jump-key-btn').onclick = function() {
            this.innerText = "...";
            const h = (e) => {
                e.preventDefault();
                dinoSettings.jumpKey = e.key;
                this.innerText = e.key === " " ? "Space" : e.key;
                window.removeEventListener('keydown', h);
            };
            window.addEventListener('keydown', h);
        };

        window.startGame = (mode) => {
            showScreen('game-container');
            resetEngine();
            if (mode === 'single') {
                currentRoomId = null;
                document.getElementById('game-status').innerText = "CHƠI ĐƠN";
                document.getElementById('lobby-overlay').classList.add('hidden');
                startCountdown();
            }
            loop();
        };

        function resetEngine() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            localDino = new Dino(dinoSettings.name, dinoSettings.color, true);
            obstacles = []; gameSpeed = 6; lastSpeedScore = 0;
            document.getElementById('score-display').innerText = "00000";
            document.getElementById('final-results-overlay').classList.add('hidden');
            gameState = 'lobby';
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#535353"; ctx.fillRect(0, GROUND_Y, canvas.width, 2);

            if (gameState === 'playing') {
                if (Date.now() - lastObstacleTime > 2000 / (gameSpeed / 5)) {
                    obstacles.push(new Obstacle(canvas.width, Math.floor(Math.random() * 4)));
                    lastObstacleTime = Date.now();
                }

                // --- ACCELERATION LOGIC: 1.1x per 100 points ---
                let currentHundred = Math.floor(localDino.score / 100);
                if (currentHundred > lastSpeedScore) {
                    lastSpeedScore = currentHundred;
                    gameSpeed *= 1.1;
                }
            }

            obstacles.forEach((o, i) => {
                if (gameState === 'playing') o.update();
                o.draw(ctx);
                if (localDino.isAlive && gameState === 'playing') {
                    if (localDino.x < o.x + o.w && localDino.x + localDino.width > o.x && localDino.y < o.y + o.h && localDino.y + localDino.height > o.y) {
                        endLocalGame();
                    }
                }
                if (o.x < -100) obstacles.splice(i, 1);
            });

            if (currentRoomId && db) syncPlayerData();

            Object.values(otherPlayers).forEach(p => {
                if (p.uid === user?.uid) return;
                const d = new Dino(p.name, p.color);
                d.y = p.y; d.isAlive = p.isAlive; d.draw(ctx);
            });
            
            localDino.update(); localDino.draw(ctx);
            document.getElementById('score-display').innerText = Math.floor(localDino.score).toString().padStart(5, '0');

            animationId = requestAnimationFrame(loop);
        }

        async function syncPlayerData() {
            if (!db || !user || !currentRoomId) return;
            const r = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId, 'players', user.uid);
            await setDoc(r, { 
                uid: user.uid, name: localDino.name, color: localDino.color, y: localDino.y, 
                score: Math.floor(localDino.score), isAlive: localDino.isAlive, isReady: localDino.isReady 
            }, {merge: true});
        }

        function endLocalGame() {
            localDino.isAlive = false;
            if (!currentRoomId) {
                showFinalResults();
            } else {
                gameState = 'waiting_result';
                document.getElementById('game-status').innerText = "TỬ TRẬN";
            }
        }

        function showFinalResults() {
            gameState = 'result';
            document.getElementById('final-results-overlay').classList.remove('hidden');
            const list = document.getElementById('ranking-list');
            list.innerHTML = "";
            
            const players = [localDino, ...Object.values(otherPlayers)].sort((a,b) => b.score - a.score);
            players.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = `flex justify-between items-center p-4 border-2 border-black rounded-xl ${i === 0 ? 'bg-yellow-300' : 'bg-white'}`;
                item.innerHTML = `<span class="font-black">#${i+1} ${p.name}</span> <span class="font-bold font-mono">${Math.floor(p.score)}</span>`;
                list.appendChild(item);
            });
        }

        function startCountdown() {
            gameState = 'countdown';
            document.getElementById('countdown-overlay').classList.remove('hidden');
            let count = 3;
            const text = document.getElementById('countdown-text');
            text.innerText = count;
            const itv = setInterval(() => {
                count--;
                if (count > 0) {
                    text.innerText = count;
                } else {
                    clearInterval(itv);
                    document.getElementById('countdown-overlay').classList.add('hidden');
                    gameState = 'playing';
                    document.getElementById('game-status').innerText = "ĐANG CHẠY";
                    lastObstacleTime = Date.now();
                }
            }, 1000);
        }

        window.handleCreateRoom = async () => {
            const name = document.getElementById('room-name').value || "Server Pro";
            const pass = document.getElementById('room-pass').value;
            const ref = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'rooms'), { 
                name, pass, hostId: user.uid, status: 'lobby', createdAt: serverTimestamp() 
            });
            currentRoomId = ref.id; isHost = true;
            setupRoomObserver();
        };

        window.listRooms = () => {
            showScreen('rooms-screen');
            const thirtyMinsAgo = Date.now() - (30 * 60 * 1000);
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'rooms'), snap => {
                const list = document.getElementById('room-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    if ((data.createdAt?.toMillis() || Date.now()) > thirtyMinsAgo) {
                        const div = document.createElement('div');
                        div.className = "flex justify-between bg-white p-4 rounded-xl border-2 border-gray-100 shadow-sm hover:border-black transition cursor-pointer";
                        div.innerHTML = `<div class="font-bold text-gray-800">${data.name}</div><button onclick="joinRoom('${d.id}', '${data.pass}')" class="text-blue-600 font-black">THAM GIA</button>`;
                        list.appendChild(div);
                    }
                });
            });
        };

        window.joinRoom = (id, pass) => {
            if (pass && prompt("Mật khẩu phòng:") !== pass) return;
            currentRoomId = id; isHost = false;
            setupRoomObserver();
        };

        function setupRoomObserver() {
            showScreen('game-container');
            resetEngine();
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId), d => {
                roomData = d.data();
                if (roomData.status === 'countdown' && gameState === 'lobby') {
                    document.getElementById('lobby-overlay').classList.add('hidden');
                    startCountdown();
                }
                if (roomData.status === 'lobby' && (gameState === 'result' || gameState === 'waiting_result')) {
                    resetEngine();
                    document.getElementById('lobby-overlay').classList.remove('hidden');
                    document.getElementById('game-status').innerText = "PHÒNG CHỜ";
                    document.getElementById('ready-btn').innerText = "SẴN SÀNG";
                    document.getElementById('ready-btn').className = "px-8 py-3 bg-blue-500 text-white font-black rounded-xl border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]";
                }
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId, 'players'), snap => {
                const playersList = [];
                let readyCount = 0; let aliveCount = 0;
                snap.forEach(d => {
                    const p = d.data(); otherPlayers[d.id] = p; playersList.push(p);
                    if (p.isReady) readyCount++;
                    if (p.isAlive) aliveCount++;
                });

                if (gameState === 'lobby') {
                    const lobbyDiv = document.getElementById('lobby-players');
                    lobbyDiv.innerHTML = playersList.map(p => `
                        <div class="flex justify-between font-bold border-b pb-1 ${p.uid === user.uid ? 'text-blue-600' : 'text-gray-600'}">
                            <span>${p.name} ${p.uid === roomData.hostId ? '👑' : ''}</span>
                            <span class="text-sm italic">${p.isReady ? '✅ Sẵn sàng' : '... Chờ'}</span>
                        </div>
                    `).join('');
                    if (isHost) {
                        document.getElementById('start-btn').classList.remove('hidden');
                        document.getElementById('start-btn').disabled = (readyCount < 2 || readyCount < playersList.length);
                    }
                }

                if (gameState === 'playing' || gameState === 'waiting_result') {
                    if (aliveCount === 0) {
                        showFinalResults();
                        document.getElementById('wait-msg').classList.add('hidden');
                        if (isHost) document.getElementById('replay-btn').classList.remove('hidden');
                    } else {
                        document.getElementById('wait-msg').classList.remove('hidden');
                        document.getElementById('replay-btn').classList.add('hidden');
                    }
                }
            });
            loop();
        }

        window.toggleReady = () => {
            localDino.isReady = !localDino.isReady;
            const btn = document.getElementById('ready-btn');
            btn.innerText = localDino.isReady ? "HỦY SẴN SÀNG" : "SẴN SÀNG";
            btn.className = localDino.isReady ? "px-8 py-3 bg-red-500 text-white font-black rounded-xl border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]" : "px-8 py-3 bg-blue-500 text-white font-black rounded-xl border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]";
            syncPlayerData();
        };

        window.requestStart = async () => {
            if (!isHost) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId), { status: 'countdown' });
        };

        window.requestReplay = async () => {
            if (!isHost) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId), { status: 'lobby' });
            localDino.isReady = false;
            syncPlayerData();
        };

        window.exitGame = () => location.reload();

        window.addEventListener('keydown', e => {
            if (e.key === dinoSettings.jumpKey) localDino?.jump();
        });

        init();
    </script>
</body>
</html>
